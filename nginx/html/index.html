<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Application Gateway v1.0</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI", sans-serif;
        background: #f4f7fb;
        color: #172033;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top right, rgba(43, 108, 176, 0.16), transparent 28%),
          linear-gradient(180deg, #f8fbff 0%, #edf3fb 100%);
      }

      main {
        max-width: 760px;
        margin: 0 auto;
        padding: 64px 24px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 40px;
        line-height: 1.1;
      }

      p {
        margin: 0 0 32px;
        font-size: 18px;
        line-height: 1.6;
        color: #4b5a73;
      }

      ul {
        list-style: none;
        padding: 0;
        margin: 0;
        display: grid;
        gap: 16px;
      }

      a {
        display: block;
        padding: 20px 24px;
        border-radius: 18px;
        text-decoration: none;
        color: inherit;
        background: rgba(255, 255, 255, 0.9);
        border: 1px solid rgba(64, 89, 130, 0.12);
        box-shadow: 0 12px 30px rgba(37, 55, 84, 0.08);
        transition:
          transform 160ms ease,
          box-shadow 160ms ease,
          border-color 160ms ease;
      }

      a:hover {
        transform: translateY(-2px);
        border-color: rgba(43, 108, 176, 0.35);
        box-shadow: 0 16px 36px rgba(37, 55, 84, 0.12);
      }

      strong {
        display: block;
        margin-bottom: 6px;
        font-size: 22px;
      }

      span {
        color: #5f6f88;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Список приложений</h1>
      <p>Через этот gateway приложения публикуются по префиксам путей через один общий nginx.</p>
      <ul>
        <li>
          <a href="/pc-man/">
            <strong>pc-man</strong>
            <span>Игра доступна по префиксу <code>/pc-man/</code>.</span>
          </a>
        </li>
      </ul>
    </main>
  </body>
</html>
